<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>frntcoda</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Geist:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --r:#C8301A;--bg:#0D0704;--s:#171009;
  --b:rgba(200,48,26,0.13);--t:#EDE6E0;--td:#7A6F6A;--tdd:#3A3330;
}
body{background:var(--bg);color:var(--t);font-family:'Geist',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}

nav{padding:22px 28px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:9px;cursor:pointer}
.logo-sq{width:30px;height:30px;background:var(--r);border-radius:7px;display:grid;place-items:center;flex-shrink:0}
.logo-name{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;letter-spacing:-0.03em;color:var(--t)}
.nav-r a{font-size:0.8rem;color:var(--td);text-decoration:none}
.nav-r a:hover{color:var(--t)}

.hero{padding:60px 28px 52px;max-width:680px}
.hero-pre{font-size:0.75rem;color:var(--td);margin-bottom:20px}
.hero h1{font-family:'Syne',sans-serif;font-size:clamp(2.1rem,5.5vw,3.4rem);font-weight:800;line-height:1.03;letter-spacing:-0.04em;margin-bottom:22px}
.hero h1 .hot{color:var(--r)}
.hero p{font-size:0.92rem;color:var(--td);line-height:1.7;max-width:420px;font-weight:300}

.divider{height:1px;background:var(--b);margin:0 28px 44px}

.apps{padding:0 28px;max-width:820px}
.apps-label{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.14em;color:var(--tdd);margin-bottom:28px}

.app-row{display:flex;align-items:center;gap:18px;padding:20px 0;border-top:1px solid var(--b);cursor:pointer;transition:opacity .15s}
.app-row:last-child{border-bottom:1px solid var(--b)}
.app-row:hover{opacity:.72}
.app-ico{width:54px;height:54px;border-radius:13px;flex-shrink:0;background:var(--s);overflow:hidden;display:grid;place-items:center;font-size:1.6rem}
.app-ico img{width:100%;height:100%;object-fit:cover}
.app-mid{flex:1;min-width:0}
.app-mid h3{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;letter-spacing:-0.02em;margin-bottom:4px}
.app-mid p{font-size:0.78rem;color:var(--td);font-weight:300;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.app-tag{font-size:0.65rem;color:var(--r);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:5px;font-weight:500}
.app-r{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
.rating{font-size:0.72rem;color:var(--td)}
.rating b{color:var(--t)}
.view-btn{background:transparent;border:1px solid rgba(200,48,26,0.35);color:var(--r);padding:5px 18px;border-radius:50px;font-size:0.75rem;font-weight:500;cursor:pointer;font-family:inherit;transition:background .15s}
.view-btn:hover{background:rgba(200,48,26,0.1)}

/* skeleton */
.sk{background:var(--s);border-radius:6px;animation:p 1.4s ease-in-out infinite}
@keyframes p{0%,100%{opacity:.35}50%{opacity:.8}}
.sk-row{display:flex;align-items:center;gap:18px;padding:20px 0;border-top:1px solid var(--b)}

footer{padding:60px 28px 40px;color:var(--tdd);font-size:0.75rem;line-height:1.8;font-weight:300}
footer a{color:var(--td);text-decoration:none}
footer a:hover{color:var(--r)}

/* ── DETAIL ── */
.page{display:block}.page.off{display:none}

.det-nav{padding:22px 28px;border-bottom:1px solid var(--b)}
.back{background:none;border:none;color:var(--td);font-size:0.82rem;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:color .15s}
.back:hover{color:var(--t)}

.det-banner{width:100%;height:200px;background:var(--s);overflow:hidden}
.det-banner img{width:100%;height:100%;object-fit:cover}

.det-top{padding:28px 28px 20px;max-width:720px;display:flex;gap:20px;align-items:flex-start}
.det-ico{width:72px;height:72px;border-radius:16px;flex-shrink:0;background:var(--s);overflow:hidden;margin-top:-44px;border:3px solid var(--bg)}
.det-ico img{width:100%;height:100%;object-fit:cover}
.det-head{flex:1;padding-top:6px}
.det-head h1{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:4px}
.det-head .by{font-size:0.75rem;color:var(--r);margin-bottom:8px;font-weight:500}
.det-head .sub{font-size:0.84rem;color:var(--td);line-height:1.55;font-weight:300;margin-bottom:18px;max-width:400px}
.det-actions{display:flex;gap:10px;flex-wrap:wrap}
.dl-btn{display:inline-flex;align-items:center;gap:8px;background:var(--r);color:#fff;border:none;padding:11px 24px;border-radius:50px;font-size:0.84rem;font-weight:500;cursor:pointer;font-family:inherit;transition:opacity .15s;text-decoration:none}
.dl-btn:hover{opacity:.85}
.dl-btn svg{stroke:#fff;flex-shrink:0}
.dl-btn.secondary{background:transparent;border:1px solid rgba(255,255,255,0.1);color:var(--td)}
.dl-btn.secondary:hover{color:var(--t);border-color:rgba(255,255,255,0.25)}

.det-body{padding:0 28px 60px;max-width:680px}
.d-sec{border-top:1px solid var(--b);padding:26px 0}
.d-lbl{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.14em;color:var(--tdd);margin-bottom:14px}
.d-about{font-size:0.87rem;color:var(--td);line-height:1.78;font-weight:300}
.d-about p+p{margin-top:12px}

.screens{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.screens::-webkit-scrollbar{display:none}
.screen{flex-shrink:0;width:140px;height:250px;border-radius:12px;background:var(--s);overflow:hidden;border:1px solid var(--b)}
.screen img{width:100%;height:100%;object-fit:cover}
.screen.empty{display:grid;place-items:center;font-size:0.68rem;color:var(--tdd)}

.feat-list{display:flex;flex-direction:column}
.feat-item{display:flex;gap:14px;padding:13px 0;border-bottom:1px solid var(--b)}
.feat-item:last-child{border-bottom:none}
.fi-ico{font-size:1rem;margin-top:1px;width:20px;flex-shrink:0}
.fi-t{font-size:0.83rem;font-weight:500;margin-bottom:2px}
.fi-d{font-size:0.74rem;color:var(--td);font-weight:300;line-height:1.45}

/* updates */
.upd-item{padding:18px 0;border-bottom:1px solid var(--b)}
.upd-item:last-child{border-bottom:none}
.upd-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px}
.upd-ver{font-size:0.85rem;font-weight:500}
.upd-date{font-size:0.68rem;color:var(--tdd)}
.upd-notes{font-size:0.8rem;color:var(--td);line-height:1.6;font-weight:300;white-space:pre-line;margin-bottom:10px}
.upd-screens{display:flex;gap:8px;overflow-x:auto;margin-bottom:10px}
.upd-screen{width:70px;height:124px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--s)}
.upd-screen img{width:100%;height:100%;object-fit:cover}
.upd-dl{display:inline-flex;align-items:center;gap:6px;font-size:0.75rem;color:var(--r);text-decoration:none;border:1px solid rgba(200,48,26,0.3);padding:4px 13px;border-radius:50px;transition:background .15s}
.upd-dl:hover{background:rgba(200,48,26,0.1)}

.meta-rows{display:flex;flex-direction:column;gap:10px}
.meta-row{display:flex;justify-content:space-between;font-size:0.8rem}
.mk{color:var(--tdd);font-weight:300}.mv{color:var(--td)}

.err{padding:80px 28px;color:var(--tdd);font-size:0.85rem}

@media(max-width:560px){
  .det-top{flex-wrap:wrap}
  .app-r{display:none}
  .app-mid p{white-space:normal}
}
</style>
</head>
<body>

<div class="page" id="home">
  <nav>
    <div class="logo" onclick="goHome()">
      <div class="logo-sq">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="3" y="3" width="2" height="10" fill="white" rx="1"/>
          <rect x="3" y="3" width="7" height="2" fill="white" rx="1"/>
          <rect x="3" y="7.5" width="5" height="1.5" fill="white" rx="0.75"/>
          <path d="M11 13c0 0 3.5-3.5 2-7.5 0 0-1 2-2.5 1.5 0 0 2-3 .5-5C11 2 8.5 4.5 8.5 7.5c0 0-1-1.5-.3-3.5C8.2 4 6.5 6 7 8.5 7.5 11.5 9.5 13.5 11 13Z" fill="url(#g)"/>
          <defs><linearGradient id="g" x1="9.5" y1="2" x2="9.5" y2="13" gradientUnits="userSpaceOnUse"><stop stop-color="#F0C040"/><stop offset="1" stop-color="#C8301A"/></linearGradient></defs>
        </svg>
      </div>
      <span class="logo-name">frntcoda</span>
    </div>
    <div class="nav-r"><a href="mailto:hello@frntcoda.dev">contact</a></div>
  </nav>

  <div class="hero">
    <div class="hero-pre">Building since 2023</div>
    <h1>I make apps.<br>Mostly for<br><span class="hot">Nigerian problems.</span></h1>
    <p>A campus market, a JAMB prep tool, a place to learn code. More coming when they're ready.</p>
  </div>

  <div class="divider"></div>

  <div class="apps">
    <div class="apps-label" id="apps-label">Apps</div>
    <div id="apps-list">
      <div class="sk-row"><div class="sk" style="width:54px;height:54px;border-radius:13px;flex-shrink:0"></div><div style="flex:1;display:flex;flex-direction:column;gap:8px"><div class="sk" style="width:38%;height:10px"></div><div class="sk" style="width:62%;height:10px"></div></div></div>
      <div class="sk-row"><div class="sk" style="width:54px;height:54px;border-radius:13px;flex-shrink:0"></div><div style="flex:1;display:flex;flex-direction:column;gap:8px"><div class="sk" style="width:32%;height:10px"></div><div class="sk" style="width:55%;height:10px"></div></div></div>
    </div>
  </div>

  <footer>
    frntcoda — independent dev.<br>
    I build things that work for people around me.<br><br>
    <a href="mailto:hello@frntcoda.dev">hello@frntcoda.dev</a>
  </footer>
</div>

<div class="page off" id="detail"></div>

<script>
const API = '/api/apps';

async function loadHome() {
  try {
    const apps = await fetch(API).then(r=>r.json());
    const list = document.getElementById('apps-list');
    document.getElementById('apps-label').textContent = `Apps — ${apps.length}`;
    if (!apps.length) { list.innerHTML='<div style="padding:40px 0;color:var(--tdd);font-size:0.82rem">No apps yet.</div>'; return; }
    list.innerHTML = apps.map(a=>`
      <div class="app-row" onclick="openApp('${a.id}')">
        <div class="app-ico">${a.icon?`<img src="${a.icon}" alt="${a.name}"/>`:'📦'}</div>
        <div class="app-mid">
          <div class="app-tag">${[a.category,a.platform].filter(Boolean).join(' · ')}</div>
          <h3>${a.name}</h3>
          <p>${a.tagline||''}</p>
        </div>
        <div class="app-r">
          ${a.rating?`<span class="rating"><b>${a.rating}</b> ★</span>`:''}
          <button class="view-btn" onclick="event.stopPropagation();openApp('${a.id}')">View</button>
        </div>
      </div>`).join('');
  } catch { document.getElementById('apps-list').innerHTML='<div style="padding:40px 0;color:var(--tdd);font-size:0.82rem">Could not load apps.</div>'; }
}

async function openApp(id) {
  const det = document.getElementById('detail');
  det.innerHTML='<div class="err">Loading…</div>';
  document.getElementById('home').classList.add('off');
  det.classList.remove('off');
  window.scrollTo({top:0,behavior:'smooth'});
  try {
    const a = await fetch(`${API}/${id}`).then(r=>r.json());

    const screens = (a.screenshots||[]).length
      ? a.screenshots.map(s=>`<div class="screen"><img src="${s}" loading="lazy"/></div>`).join('')
      : '<div class="screen empty">no screenshots</div>';

    const feats = (a.features||[]).map(f=>`
      <div class="feat-item">
        <div class="fi-ico">${f.icon||''}</div>
        <div><div class="fi-t">${f.title||''}</div><div class="fi-d">${f.desc||''}</div></div>
      </div>`).join('');

    const updates = (a.updates||[]).filter(u=>!u.hidden).map(u=>`
      <div class="upd-item">
        <div class="upd-head"><span class="upd-ver">v${u.version}</span><span class="upd-date">${fmt(u.date)}</span></div>
        <div class="upd-notes">${u.whatsNew}</div>
        ${(u.screenshots||[]).length?`<div class="upd-screens">${u.screenshots.map(s=>`<div class="upd-screen"><img src="${s}" loading="lazy"/></div>`).join('')}</div>`:''}
        ${u.apk?`<a class="upd-dl" href="${u.apk}" download><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v7M3 5l3 3 3-3M1 10h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg> Download v${u.version}</a>`:''}
      </div>`).join('');

    det.innerHTML = `
      <div class="det-nav"><button class="back" onclick="goHome()">← All apps</button></div>
      <div class="det-banner">${a.banner?`<img src="${a.banner}" alt=""/>`:'<div style="width:100%;height:100%;background:var(--s)"></div>'}</div>
      <div class="det-top">
        <div class="det-ico">${a.icon?`<img src="${a.icon}" alt="${a.name}"/>`:'📦'}</div>
        <div class="det-head">
          <h1>${a.name}</h1>
          <div class="by">by frntcoda</div>
          <div class="sub">${a.tagline||''}</div>
          <div class="det-actions">
            ${a.apk?`<a class="dl-btn" href="${a.apk}" download><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v8M4 7l3 3 3-3M2 12h10" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Download APK</a>`:''}
          </div>
        </div>
      </div>
      <div class="det-body">
        ${a.about?`<div class="d-sec"><div class="d-lbl">About</div><div class="d-about">${a.about.split('\n\n').map(p=>`<p>${p}</p>`).join('')}</div></div>`:''}
        <div class="d-sec"><div class="d-lbl">Screenshots</div><div class="screens">${screens}</div></div>
        ${feats?`<div class="d-sec"><div class="d-lbl">What's in it</div><div class="feat-list">${feats}</div></div>`:''}
        ${updates?`<div class="d-sec"><div class="d-lbl">Updates</div>${updates}</div>`:''}
        <div class="d-sec">
          <div class="d-lbl">Info</div>
          <div class="meta-rows">
            <div class="meta-row"><span class="mk">Version</span><span class="mv">${a.version||'—'}</span></div>
            ${a.size?`<div class="meta-row"><span class="mk">Size</span><span class="mv">${a.size}</span></div>`:''}
            ${a.platform?`<div class="meta-row"><span class="mk">Platform</span><span class="mv">${a.platform}</span></div>`:''}
            ${a.downloads?`<div class="meta-row"><span class="mk">Downloads</span><span class="mv">${a.downloads}</span></div>`:''}
          </div>
        </div>
      </div>`;
  } catch { det.innerHTML='<div class="err">Failed to load app.</div>'; }
}

function goHome() {
  document.getElementById('home').classList.remove('off');
  document.getElementById('detail').classList.add('off');
  window.scrollTo({top:0,behavior:'smooth'});
}

function fmt(d) {
  return new Date(d).toLocaleDateString('en-NG',{year:'numeric',month:'short',day:'numeric'});
}

loadHome();
</script>
</body>
</html>
